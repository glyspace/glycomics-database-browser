<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Glyspace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<div class="container">

    <!-- Main Content -->
    <div class="main">

        <h1>Welcome to Glyspace!</h1>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search resources...">
            <button id="searchBtn">Search</button>
            
        </div>
        <div id="resultsCount">Showing <span id="count"></span> resources</div>
        <br/>
        <div id="cards" class="cards-grid"></div>

    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div id="sidebar" class="cards-grid"></div>
       
        <h3>Resource Type</h3>
        <div class="filter-group" id="resourceTypeFilters">
            
        </div>

         <h3>Data Type</h3>
        <div class="filter-group" id="dataTypeFilters">
        </div>

    </div>

</div>

<div id="popup" class="popup">
  <div class="popup-content">
    <span class="popup-close">&times;</span>
    <div class="popup-header">
      <h3 id="popup-title"></h3>
      <img id="popup-logo" class="popup-logo" src="" >
    </div>
    <p><strong>Resource Type:</strong> <span id="popup-resourcetype"></span></p>
    <p><strong>Datatype:</strong> <span id="popup-datatype"></span></p>
    <p><strong>Description:</strong></p>
    <p id="popup-description"></p>
    <p><a href="" id="popup-url" target="_blank">Visit Resource</a></p>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
